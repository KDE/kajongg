---
name: kajongg
confinement: strict
grade: stable
base: core24
adopt-info: kajongg
apps:
  kajongg:
    extensions:
      - kde-neon-6
    common-id: org.kde.kajongg
    desktop: usr/share/applications/org.kde.kajongg.desktop
    command: usr/bin/kajongg
    plugs:
      - audio-record
    environment:
      PYTHONUSERBASE: "$SNAP_USER_COMMON/.local"
      PYTHONPATH: "$PYTHONUSERBASE/lib/python3.12/site-packages:$SNAP/lib/python3.12/site-packages:$SNAP/usr/lib/python3/dist-packages:$SNAP/usr/share/kajongg"
slots:
  session-dbus-interface:
    interface: dbus
    name: org.kde.kajongg
    bus: session
parts:
  libkmahjongg:
    plugin: cmake
    source: https://invent.kde.org/games/libkmahjongg.git
    build-snaps:
      - kde-qt6-core24-sdk/latest/stable
      - kde-pyside6-core24-sdk/latest/stable
      - kf6-core24-sdk/latest/stable
    stage-packages:
      - rsync
      - libpopt0
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DQT_MAJOR_VERSION=6
      - -DBUILD_TESTING=OFF
    override-stage: |
        craftctl default
        rsync -a --ignore-existing $CRAFT_PART_INSTALL/ /
  kajongg:
    after:
      - libkmahjongg
    parse-info:
      - usr/share/metainfo/org.kde.kajongg.appdata.xml
    plugin: cmake
    source: .
    source-type: local
    build-snaps:
      - kde-qt6-core24-sdk/latest/stable
      - kde-pyside6-core24-sdk/latest/stable
      - kf6-core24-sdk/latest/stable
    build-packages:
      - python3-twisted
      - libxkbcommon-dev
    stage-packages:
      - libxkbcommon0
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DQT_MAJOR_VERSION=6
      - -DBUILD_TESTING=OFF
    prime:
      - -usr/lib/*/cmake/*
      - -usr/include/*
      - -usr/share/ECM/*
      - -usr/share/man/*
      - -usr/bin/X11
      - -usr/lib/gcc/$CRAFT_ARCH_TRIPLET_BUILD_FOR/6.0.0
      - -usr/lib/aspell/*
      - -usr/share/lintian
    override-build: |
        craftctl default
        rm $CRAFT_PART_INSTALL/usr/bin/kajongg
        cp $CRAFT_PART_INSTALL/usr/share/kajongg/kajongg.py $CRAFT_PART_INSTALL/usr/bin/kajongg
        rm $CRAFT_PART_INSTALL/usr/bin/kajonggserver
        cp $CRAFT_PART_INSTALL/usr/share/kajongg/kajonggserver.py $CRAFT_PART_INSTALL/usr/bin/kajonggserver
  gpu-2404:
    after: [kajongg]
    source: https://github.com/canonical/gpu-snap.git
    plugin: dump
    override-prime: |
      craftctl default
      ${CRAFT_PART_SRC}/bin/gpu-2404-cleanup mesa-2404
    prime:
      - bin/gpu-2404-wrapper
  cleanup:
    after:
      - kajongg
    plugin: nil
    build-snaps:
      - core24
      - kf6-core24
    override-prime: |
      set -eux
      for snap in "core24" "kf6-core24"; do
          cd "/snap/$snap/current" && find . -type f,l -exec rm -rf "${CRAFT_PRIME}/{}" \;
      done
